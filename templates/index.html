<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METEOR-IX | Weather Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.7);
            --accent-blue: #00d2ff;
            --accent-orange: #ff9f43;
            --accent-red: #ff4b2b;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-weight: 600;
            letter-spacing: 4px;
            font-size: 1.2rem;
            color: var(--accent-blue);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff00;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 210, 255, 0.3);
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .unit {
            font-size: 1rem;
            color: var(--text-dim);
        }

        .chart-container {
            grid-column: 1 / -1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            height: 350px;
        }

        .footer {
            margin-top: 40px;
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .value { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">METEOR-IX</div>
        <div style="font-size: 0.8rem; color: var(--text-dim);">
            <span class="status-dot"></span>STATION ACTIVE
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="label">Atmospheric Pressure</div>
            <div class="value" id="pres-val">--.-<span class="unit"> hPa</span></div>
            <div id="trend-text" style="font-size: 0.9rem; color: var(--accent-blue);">Live Monitoring</div>
        </div>

        <div class="card">
            <div class="label">Ambient Temperature</div>
            <div class="value" id="temp-val" style="color: var(--accent-orange);">--.-<span class="unit"> °C</span></div>
            <div style="font-size: 0.9rem; color: var(--text-dim);">Live ESP8266 Sync</div>
        </div>

        <div class="chart-container">
            <div class="label">Pressure Variation (Real-time Plot)</div>
            <canvas id="weatherChart"></canvas>
        </div>
    </div>

    <div class="footer">DIAMOND HARBOUR OBSERVATORY • 2026</div>

    <script>
        // Initialize Chart
        const ctx = document.getElementById('weatherChart').getContext('2d');
        const weatherChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [{
                    label: 'Pressure (hPa)',
                    data: [],
                    borderColor: '#00d2ff',
                    borderWidth: 3,
                    pointRadius: 2,
                    pointBackgroundColor: '#00d2ff',
                    fill: true,
                    backgroundColor: 'rgba(0, 210, 255, 0.05)',
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { 
                        ticks: { color: '#555', maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }
                    },
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#888', font: { family: 'JetBrains Mono' } }
                    }
                }
            }
        });

        function updateDashboard() {
            fetch('/get_data')
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        // The last item in the list is the most recent
                        const latest = data[data.length - 1]; 
                        
                        const tempElement = document.getElementById('temp-val');
                        const presElement = document.getElementById('pres-val');

                        if (tempElement) {
                            tempElement.childNodes[0].nodeValue = latest.temp.toFixed(1);
                        }
                        if (presElement) {
                            presElement.childNodes[0].nodeValue = latest.pres.toFixed(1);
                        }

                        // GRAPH PLOTTING LOGIC
                        // Map labels to just show the Time (HH:MM)
                        const labels = data.map(d => d.timestamp.split(' ')[1]);
                        const pressures = data.map(d => d.pres);

                        weatherChart.data.labels = labels;
                        weatherChart.data.datasets[0].data = pressures;
                        weatherChart.update();
                    }
                })
                .catch(error => console.error('Dashboard Sync Failed:', error));
        }

        // Run every 60 seconds (1 minute)
        setInterval(updateDashboard, 60000);
        updateDashboard(); 
    </script>
</body>
</html>
