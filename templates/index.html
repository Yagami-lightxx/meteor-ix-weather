<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METEOR-IX | Weather Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(12, 12, 12, 0.8);
            --accent-blue: #00d2ff;
            --accent-orange: #ff9f43;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --ambient-color: rgba(0, 210, 255, 0.2); /* Default */
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Glow Effect */
        .ambient-glow {
            position: fixed;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            transition: background 2s ease-in-out;
            animation: jiggle 8s infinite ease-in-out;
        }
        .glow-left { left: -15vw; top: 20vh; background: var(--ambient-color); }
        .glow-right { right: -15vw; bottom: 10vh; background: var(--ambient-color); animation-delay: -4s; }

        @keyframes jiggle {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 40px) scale(0.9); }
        }

        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        .logo {
            font-weight: 600;
            letter-spacing: 4px;
            font-size: 1.2rem;
            color: var(--accent-blue);
        }

        .status-dot {
            height: 8px; width: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff00;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .unit { font-size: 1rem; color: var(--text-dim); }

        .chart-container {
            grid-column: 1 / -1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            height: 350px;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .credits {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
            opacity: 0.6;
            margin-top: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        @media (max-width: 600px) { .value { font-size: 2rem; } }
    </style>
</head>
<body>

    <div class="ambient-glow glow-left" id="ambient-l"></div>
    <div class="ambient-glow glow-right" id="ambient-r"></div>

    <div class="header">
        <div class="logo">METEOR-IX</div>
        <div style="font-size: 0.7rem; color: var(--text-dim); font-family: 'JetBrains Mono';">
            <span class="status-dot"></span>STATION ACTIVE | IST
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="label">Atmospheric Pressure</div>
            <div class="value" id="pres-val">--.-<span class="unit"> hPa</span></div>
            <div id="trend-text" style="font-size: 0.8rem; color: var(--accent-blue);">DYNAMIC TRACKING</div>
        </div>

        <div class="card">
            <div class="label">Ambient Temperature</div>
            <div class="value" id="temp-val">--.-<span class="unit"> °C</span></div>
            <div style="font-size: 0.8rem; color: var(--text-dim);">SENSOR CLOUD SYNC</div>
        </div>

        <div class="chart-container">
            <div class="label">Pressure Variation (Real-time IST)</div>
            <canvas id="weatherChart"></canvas>
        </div>
    </div>

    <div class="footer">
        DIAMOND HARBOUR OBSERVATORY • 2026<br>
        <div class="credits">Created by Ayus Das • Systems Architect</div>
    </div>

    <script>
        const ctx = document.getElementById('weatherChart').getContext('2d');
        const weatherChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [{
                    label: 'Pressure',
                    data: [],
                    borderColor: '#00d2ff',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(0, 210, 255, 0.03)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#444', font: { size: 10 } } },
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#666' } }
                }
            }
        });

        function updateAmbientEffect(temp) {
            let color = "";
            if (temp >= 40) color = "rgba(139, 0, 0, 0.4)";       // Blackish Red
            else if (temp >= 35) color = "rgba(255, 0, 0, 0.4)";   // Red
            else if (temp >= 30) color = "rgba(255, 69, 0, 0.4)";  // Reddish Orange
            else if (temp >= 23) color = "rgba(255, 165, 0, 0.4)"; // Orange
            else color = "rgba(0, 255, 127, 0.4)";                 // Greenish/Blue variant

            document.getElementById('ambient-l').style.background = color;
            document.getElementById('ambient-r').style.background = color;
            document.getElementById('temp-val').style.color = color.replace('0.4', '1');
        }

        function updateDashboard() {
            fetch('/get_data')
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const latest = data[data.length - 1]; 
                        
                        document.getElementById('temp-val').childNodes[0].nodeValue = latest.temp.toFixed(1);
                        document.getElementById('pres-val').childNodes[0].nodeValue = latest.pres.toFixed(1);

                        updateAmbientEffect(latest.temp);

                        const labels = data.map(d => d.timestamp.split(' ')[1]);
                        const pressures = data.map(d => d.pres);

                        weatherChart.data.labels = labels;
                        weatherChart.data.datasets[0].data = pressures;
                        weatherChart.update();
                    }
                })
                .catch(error => console.error('Sync Error:', error));
        }

        setInterval(updateDashboard, 60000);
        updateDashboard(); 
    </script>
</body>
</html>
