<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METEOR-IX | Weather Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(12, 12, 12, 0.8);
            --accent-blue: #00d2ff;
            --accent-orange: #ff9f43;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --warn-red: #ff3e3e;
            --safe-green: #00ff88;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .ambient-glow {
            position: fixed;
            width: 45vw;
            height: 45vw;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            transition: all 1.5s ease-in-out;
            animation: jiggle 8s infinite ease-in-out;
        }
        .glow-left { left: -15vw; top: 20vh; }
        .glow-right { right: -15vw; bottom: 10vh; animation-delay: -4s; }

        @media (max-width: 600px) {
            .ambient-glow { width: 90vw; height: 90vw; opacity: 0.6; filter: blur(60px); }
        }

        @keyframes jiggle {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 40px) scale(0.9); }
        }

        @keyframes warningFade {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }
        .warning-active { animation: warningFade 2s infinite ease-in-out !important; }

        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        .logo { font-weight: 600; letter-spacing: 4px; font-size: 1.1rem; color: var(--accent-blue); }

        .sentry-banner {
            width: 100%;
            max-width: 1000px;
            padding: 15px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            gap: 12px;
            transition: all 0.5s ease;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
        }

        .value { font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; font-weight: 500; }
        .unit { font-size: 1rem; color: var(--text-dim); }

        .chart-container {
            grid-column: 1 / -1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            height: 320px;
        }

        .footer { margin-top: 50px; text-align: center; color: var(--text-dim); font-size: 0.75rem; }
        .credits { font-family: 'JetBrains Mono', monospace; color: var(--text-main); opacity: 0.6; margin-top: 5px; }

        @media (max-width: 600px) { .value { font-size: 2rem; } .header { flex-direction: column; gap: 10px; } }
    </style>
</head>
<body>

    <div class="ambient-glow glow-left" id="ambient-l"></div>
    <div class="ambient-glow glow-right" id="ambient-r"></div>

    <div class="header">
        <div class="logo">METEOR-IX</div>
        <div style="font-size: 0.7rem; color: var(--text-dim); font-family: 'JetBrains Mono';">
            STATION: DIAMOND HARBOUR | IST
        </div>
    </div>

    <div class="sentry-banner" id="sentry-box">
        <span id="sentry-emoji" style="font-size: 1.5rem;">😊</span>
        <div id="sentry-text" style="font-weight: 500; letter-spacing: 0.5px; color: var(--safe-green);">
            NO WARNING, YOU ARE SAFE.
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;">Pressure</div>
            <div class="value" id="pres-val">--.-<span class="unit"> hPa</span></div>
        </div>

        <div class="card">
            <div style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;">Temperature</div>
            <div class="value" id="temp-val">--.-<span class="unit"> °C</span></div>
        </div>

        <div class="chart-container">
            <canvas id="weatherChart"></canvas>
        </div>
    </div>

    <div class="footer">
        DIAMOND HARBOUR OBSERVATORY • 2026<br>
        <div class="credits">Created by Ayus Das • Systems Architect</div>
    </div>

    <script>
        const ctx = document.getElementById('weatherChart').getContext('2d');
        const weatherChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [{
                    data: [],
                    borderColor: '#00d2ff',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(0, 210, 255, 0.05)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { 
                        ticks: { 
                            color: '#555', 
                            font: { size: 10, family: "'JetBrains Mono'" },
                            maxRotation: 0, 
                            autoSkip: true, 
                            maxTicksLimit: 5 // Forces a clean look on all screens
                        }, 
                        grid: { display: false } 
                    },
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.03)' }, 
                        ticks: { color: '#555', font: { size: 10 } } 
                    }
                }
            }
        });

        function applyStormWarning(isActive) {
            const box = document.getElementById('sentry-box');
            const emoji = document.getElementById('sentry-emoji');
            const text = document.getElementById('sentry-text');
            const glowL = document.getElementById('ambient-l');
            const glowR = document.getElementById('ambient-r');

            if (isActive) {
                box.style.background = "rgba(255, 62, 62, 0.15)";
                box.style.borderColor = "var(--warn-red)";
                emoji.innerText = "⚠️😱";
                text.innerText = "WARNING: UNSTABLE PRESSURE DETECTED";
                text.style.color = "var(--warn-red)";
                
                glowL.style.background = "var(--warn-red)";
                glowR.style.background = "var(--warn-red)";
                glowL.classList.add('warning-active');
                glowR.classList.add('warning-active');
            } else {
                box.style.background = "rgba(255, 255, 255, 0.03)";
                box.style.borderColor = "var(--border)";
                emoji.innerText = "😊";
                text.innerText = "NO WARNING, YOU ARE SAFE.";
                text.style.color = "var(--safe-green)";
                
                glowL.classList.remove('warning-active');
                glowR.classList.remove('warning-active');
            }
        }

        function updateAmbientColor(temp, isWarning) {
            if (isWarning) return; 

            let color = "";
            if (temp >= 40) color = "rgba(139, 0, 0, 0.4)";
            else if (temp >= 35) color = "rgba(255, 0, 0, 0.4)";
            else if (temp >= 30) color = "rgba(255, 69, 0, 0.4)";
            else if (temp >= 23) color = "rgba(255, 165, 0, 0.4)";
            else color = "rgba(0, 210, 255, 0.3)";

            document.getElementById('ambient-l').style.background = color;
            document.getElementById('ambient-r').style.background = color;
            document.getElementById('temp-val').style.color = color.replace('0.4', '1').replace('0.3', '1');
        }

        function updateDashboard() {
            fetch('/get_data')
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const latest = data[data.length - 1];
                        document.getElementById('temp-val').childNodes[0].nodeValue = latest.temp.toFixed(1);
                        document.getElementById('pres-val').childNodes[0].nodeValue = latest.pres.toFixed(1);

                        let stormDetected = false;
                        if (data.length >= 120) {
                            const twoHoursAgo = data[0].pres;
                            const drop = twoHoursAgo - latest.pres;
                            if (drop >= 1.5) stormDetected = true;
                        }

                        applyStormWarning(stormDetected);
                        updateAmbientColor(latest.temp, stormDetected);

                        // Only show the last 40 points for a cleaner graph view
                        const graphData = data.slice(-40);
                        const labels = graphData.map(d => d.timestamp.split(' ')[1].substring(0, 5));
                        const pressures = graphData.map(d => d.pres);
                        
                        weatherChart.data.labels = labels;
                        weatherChart.data.datasets[0].data = pressures;
                        weatherChart.update();
                    }
                });
        }

        setInterval(updateDashboard, 60000);
        updateDashboard();
    </script>
</body>
</html>
